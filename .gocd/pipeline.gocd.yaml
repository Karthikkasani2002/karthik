format_version: 10

pipelines:
  onboarding-service:
    group: upi

    environment_variables:
      DOCKER_USERNAME: karthik1209
      DOCKER_PASSWORD: Olive@1444   # 🔥 replace with Docker Hub token

    materials:
      git:
        git: https://github.com/Karthikkasani2002/karthik.git
        branch: main

    stages:

    - build:
        jobs:
          compile:
            tasks:
              - exec:
                  command: sh
                  arguments:
                    - -c
                    - |
                      cd onboarding-initiator
                      go build -o app ./cmd/service

    - docker-build:
        jobs:
          docker:
            tasks:
              - exec:
                  command: sh
                  arguments:
                    - -c
                    - |
                      cd onboarding-initiator
                      docker build -t karthik1209/onboarding:v8 -f deployments/Dockerfile .

    - docker-push:
        jobs:
          push:
            tasks:
              - exec:
                  command: sh
                  arguments:
                    - -c
                    - |
                      echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
                      docker push karthik1209/onboarding:v8

    - deploy:
        jobs:
          k8s-deploy:
            tasks:
              - exec:
                  command: sh
                  arguments:
                    - -c
                    - |
                      kubectl apply -f onboarding-initiator/deployments/k8s/
