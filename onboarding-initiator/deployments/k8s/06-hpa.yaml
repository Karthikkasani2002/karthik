apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:

  name: onboarding

  namespace: onboarding

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: onboarding

  minReplicas: 3

  maxReplicas: 10

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 70
